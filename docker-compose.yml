services:
  docusaurus:
    image: cloudseidoranalytics/portal:e2c8e6d91e1e4e3bac0f6803981c9f686d3f2868
    # IMPORTANTE: No añadir sección 'build' aquí. 
    # La imagen se construye en GitHub Actions y Portainer solo debe descargarla (PULL).
    ports:
      - "3050:80"  # Solo HTTP, Nginx Proxy Manager hace el TLS
    restart: unless-stopped